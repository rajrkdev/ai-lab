<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Academy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; font-family: system-ui, sans-serif; min-height: 100vh; }
  </style>
</head>
<body>
  <nav style="position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);background:rgba(13,17,23,0.88);border-bottom:1px solid rgba(255,255,255,0.08);padding:0.5rem 1.25rem;display:flex;align-items:center;gap:0.875rem;font-family:system-ui,-apple-system,sans-serif;">
    <a href="/ai-lab/" style="color:#58a6ff;text-decoration:none;font-size:0.8125rem;display:flex;align-items:center;gap:0.25rem;opacity:0.9;transition:opacity 0.15s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.9'">← Context</a>
    <span style="color:#30363d;font-size:0.8125rem;">|</span>
    <span style="color:#8b949e;font-size:0.8125rem;">RAG Academy</span>
  </nav>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    fetch('./rag-academy.jsx')
      .then(r => r.text())
      .then(src => {
        const code = src
          .replace(/^import\s+.*?from\s+['"]react['"];?\n?/gm, '')
          .replace(/^export\s+default\s+/m, '');
        const wrapped = `const {useState,useEffect,useRef,useMemo,useCallback}=React;\n${code}\nReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RAGAcademy));`;
        const compiled = Babel.transform(wrapped, { presets: ['react'] }).code;
        const s = document.createElement('script');
        s.textContent = compiled;
        document.body.appendChild(s);
      })
      .catch(e => { document.getElementById('root').innerHTML = '<p style="color:red;padding:20px">Error loading component: ' + e.message + '</p>'; });
  </script>
</body>
</html>
