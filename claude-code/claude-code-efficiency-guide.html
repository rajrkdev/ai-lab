<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code — Context, Cost & Token Efficiency Guide</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #09090f; font-family: system-ui, sans-serif; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    fetch('./claude-code-efficiency-guide.jsx')
      .then(r => r.text())
      .then(src => {
        const code = src
          .replace(/^import\s+.*?from\s+['"]react['"];?\n?/gm, '')
          .replace(/^export\s+default\s+/m, '');
        const wrapped = `const {useState,useEffect,useRef,useMemo,useCallback}=React;\n${code}\nReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));`;
        try {
          const compiled = Babel.transform(wrapped, { presets: ['react'] }).code;
          const s = document.createElement('script');
          s.textContent = compiled;
          document.body.appendChild(s);
        } catch(e) {
          document.getElementById('root').innerHTML = '<p style="color:red;padding:20px;font-family:monospace">Babel error: ' + e.message + '</p>';
        }
      })
      .catch(e => { document.getElementById('root').innerHTML = '<p style="color:red;padding:20px">Fetch error: ' + e.message + '</p>'; });
  </script>
</body>
</html>
