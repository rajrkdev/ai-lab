title: Claude Code Mastery
description: Configuration, architecture, interactive diagrams & RAG guides for developers
theme: jekyll-theme-slate
url: "https://dearraj25rk-jpg.github.io"
baseurl: "/ai-lab"

# Build settings
markdown: kramdown
highlighter: rouge

# Exclude files from build
exclude:
  - README.md
  - LICENSE
  - .gitignore
  - "*.docx"
  - "reference/*.docx"
  - "prompts/document.md"
  - scripts/
  - prd/

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
