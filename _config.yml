title: Claude Code Mastery
description: A resource for Claude Code — configuration, architecture, and training
theme: jekyll-theme-slate

# Build settings
markdown: kramdown
highlighter: rouge

# Exclude files from build
exclude:
  - README.md
  - LICENSE
  - .gitignore
  - "*.docx"
  - "reference/*.docx"
  - "prompts/document.md"
  - scripts/
  - prd/

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
