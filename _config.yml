title: Claude Code Mastery
description: A comprehensive resource for mastering Claude Code — configuration, architecture, and training
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

# Build settings
markdown: kramdown
highlighter: rouge

# Exclude files from build
exclude:
  - README.md
  - LICENSE
  - .gitignore
  - "*.jsx"
  - "*.png"

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
